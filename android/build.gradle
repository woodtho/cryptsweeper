// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// Keep every module's generated output under android/build. In particular,
// Capacitor's included project otherwise writes into node_modules, where
// OneDrive can lock incremental resource directories during local installs.
def sharedBuildRoot = layout.buildDirectory.dir('subprojects')
subprojects {
    layout.buildDirectory = sharedBuildRoot.map { root -> root.dir(project.name) }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
